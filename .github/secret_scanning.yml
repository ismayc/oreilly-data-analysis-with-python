# Secret scanning: skip generated, deployable build artifacts.
# app/ holds the built Quarto Live + JupyterLite sites. Their minified vendor
# bundles (e.g. JupyterLite's `s.DriveFSEmscriptenNodeOps`) trip GitHub's
# HashiCorp Vault token pattern -- a false positive. The source notebooks and
# .qmd files live at the repo root and remain scanned.
paths-ignore:
  - 'app/**'
